<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapping Design Experiment</title>
    
    <script src="https://unpkg.com/konva@10/konva.min.js"></script>

     <link rel="stylesheet" href="mappingReset.css">
     <link rel="stylesheet" href="mappingStyle.css">
     <script src="mappingMain.js" defer></script>
</head>
<body>

<main>

    <div class="toolBar">
        <button id="circle-button">draw a new circle</button>
        <fieldset>
            <legend>Pick a new circle colour:</legend>

            <div>
                <input type="radio" id="change-red" name="colourSelect" value="red" checked />
                <label for="change-red">Red</label>
            </div>

            <div>
                <input type="radio" id="change-yellow" name="colourSelect" value="yellow" />
                <label for="change-yellow">Yellow</label>
            </div>

            <div>
                <input type="radio" id="change-blue" name="colourSelect" value="blue" />
                <label for="change-blue">Blue</label>
            </div>
        </fieldset>
    </div>

    <div class="stageContainer" id="stage-container">
        <div id="konva-stage"></div>
    </div>
</main>
    
</body>
</html>
